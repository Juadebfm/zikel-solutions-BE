# fly.toml — Fly.io deployment configuration for zikel-solutions
# Deploy: fly deploy
# Rollback: fly releases && fly deploy --image <image-id>

app = "zikel-solutions"
primary_region = "lhr"  # London — align with Neon region

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOST = "0.0.0.0"
  LOG_LEVEL = "info"

# All secrets (JWT_SECRET, DATABASE_URL, DIRECT_URL, CORS_ORIGINS)
# are stored in Fly secrets — never in this file.
# Set with: fly secrets set KEY=value

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  # Runs Prisma migrations before new app instances receive traffic
  release_command = "npx prisma migrate deploy"
  strategy = "rolling"
