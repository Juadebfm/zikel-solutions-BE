# fly.toml app configuration file generated for zikel-solutions-be-kpotja on 2026-03-18T10:34:55Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zikel-solutions-be-kpotja'
primary_region = 'ams'

[build]

# Run pending SQL migrations before traffic moves to the new release (requires DATABASE_URL / DIRECT_URL secrets).
[deploy]
  release_command = "npx prisma migrate deploy"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
